name: Feature request
description: Propose a scoped capability or contract improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or outcome
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope and non-goals
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and acceptance criteria
      description: Link the backlog item, security/evaluation impact, and measurable acceptance criteria.
    validations:
      required: true
