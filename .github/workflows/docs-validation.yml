name: docs-validation

on:
  push:
    branches:
      - main
      - docs/phase0-closeout
    paths:
      - ".gitattributes"
      - ".githooks/pre-commit"
      - ".github/CODEOWNERS"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "Makefile"
      - "MANIFEST.json"
      - ".node-version"
      - ".python-version"
      - "package-lock.json"
      - "pyproject.toml"
      - "docs/**"
      - "fixtures/**"
      - "scripts/**"
      - "uv.lock"
      - ".github/workflows/docs-validation.yml"
  pull_request:
    paths:
      - ".gitattributes"
      - ".githooks/pre-commit"
      - ".github/CODEOWNERS"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "Makefile"
      - "MANIFEST.json"
      - ".node-version"
      - ".python-version"
      - "package-lock.json"
      - "pyproject.toml"
      - "docs/**"
      - "fixtures/**"
      - "scripts/**"
      - "uv.lock"
      - ".github/workflows/docs-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-validation:
    name: docs-validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        run: python -m pip install uv==0.11.16

      - name: Synchronize documentation tooling
        run: uv sync --locked --only-dev

      - name: Lint and type-check documentation tooling
        run: |
          uv run --locked --only-dev --no-sync ruff check scripts
          uv run --locked --only-dev --no-sync mypy scripts

      - name: Run documentation validation contract
        run: |
          uv run --locked --only-dev --no-sync python scripts/validate_docs.py --self-test
          uv run --locked --only-dev --no-sync python scripts/generate_manifest.py --check
          uv run --locked --only-dev --no-sync python scripts/validate_docs.py
