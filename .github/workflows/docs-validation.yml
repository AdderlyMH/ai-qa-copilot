name: docs-validation

on:
  push:
    branches:
      - main
      - docs/phase0-closeout
    paths:
      - ".gitattributes"
      - ".githooks/pre-commit"
      - ".github/CODEOWNERS"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "Makefile"
      - "MANIFEST.json"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - "requirements-docs.txt"
      - "docs/**"
      - "fixtures/**"
      - "scripts/**"
      - ".github/workflows/docs-validation.yml"
  pull_request:
    paths:
      - ".gitattributes"
      - ".githooks/pre-commit"
      - ".github/CODEOWNERS"
      - ".github/dependabot.yml"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "Makefile"
      - "MANIFEST.json"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - "requirements-docs.txt"
      - "docs/**"
      - "fixtures/**"
      - "scripts/**"
      - ".github/workflows/docs-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-validation:
    name: docs-validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install repository validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run repository validation contract
        run: python scripts/tasks.py ci
