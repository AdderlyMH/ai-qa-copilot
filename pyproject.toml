[tool.ruff]
target-version = "py313"
extend-exclude = [".uv-cache", ".uv-python", ".venv"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.mypy]
files = ["scripts"]
python_version = "3.13"
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
