schema_version: fixture-manifest/v1
manifest_id: BENCHMARK-FIXTURES-V1
status: approved_contract
classification: synthetic_public_only
purpose: >
  Defines immutable benchmark source artifacts, deterministic variants,
  parser/security fixtures, and the 100-case evaluation allocation.
base_artifacts:
  - id: REQ-BASE-001
    embedded_fixture_id: OMR-BASE-001
    path: fixtures/sample-requirements.md
    media_type: text/markdown
    version: 1
    hashes:
      git_blob_sha1: d3f5f731851d2502a8537b359ee62c4909a00039
    role: seeded_requirement_evidence
    mutable: false
    expected_ground_truth_ids:
      - GT-FIND-001
      - GT-FIND-002
      - GT-FIND-003
      - GT-FIND-004
      - GT-FIND-005
      - GT-FIND-006
      - GT-FIND-007
      - GT-FIND-008
      - GT-FIND-009
      - GT-FIND-010
      - GT-FIND-011
      - GT-FIND-012
      - GT-FIND-013
      - GT-FIND-014
      - GT-FIND-015
      - GT-FIND-016

  - id: OAS-BASE-001
    path: fixtures/sample-openapi.yaml
    media_type: application/yaml
    format: openapi-3.1
    version: 1
    hashes:
      git_blob_sha1: 1135f905866d728a8e2064df98397b8117880593
    role: seeded_contract_evidence
    mutable: false
    expected_ground_truth_ids:
      - GT-FIND-006
      - GT-FIND-007
      - GT-FIND-008
      - GT-FIND-009
      - GT-FIND-010
      - GT-FIND-011
      - GT-FIND-012
      - GT-FIND-013
      - GT-FIND-014
      - GT-FIND-015
      - GT-FIND-016
source_controls:
  allowed_data_classification:
    - synthetic
    - public
  prohibited_data:
    - employer_data
    - customer_data
    - production_credentials
    - production_endpoints
    - personal_data_not_required_for_fixture
  immutability:
    base_artifacts_must_match_declared_hash: true
    variants_must_reference_parent_artifact_id: true
    variants_must_have_own_hash_before_release_use: true
  trust:
    all_fixture_text_metadata_and_urls: untrusted
    evidence_may_inform_analysis_only: true
    evidence_must_not_modify:
      - system_or_developer_instructions
      - tool_definitions
      - schemas
      - target_configuration
      - headers_or_credentials
      - approvals
      - policy_limits
      - evaluation_gates
  network:
    external_reference_resolution: forbidden
    fixture_url_execution: forbidden
    fixture_dns_or_http_side_effects: forbidden
  unsupported_formats:
    - xml
    - junit_xml
    - archives
    - compressed_wrappers
variant_families:
  - id: VF-REQ-OVERLAY-001
    purpose: requirement ambiguities contradictions omissions and boundary variants
    parents: [REQ-BASE-001]
    generation: deterministic_overlay
    required_before_release: true

  - id: VF-OAS-OVERLAY-001
    purpose: contract field response enum security operation and limit variants
    parents: [OAS-BASE-001]
    generation: deterministic_overlay
    required_before_release: true

  - id: VF-CLEAN-CONTROL-001
    purpose: no-defect controls
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: deterministic_overlay

  - id: VF-NO-EVIDENCE-001
    purpose: unsupported-answer and evidence-gap controls
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: deterministic_query_and_context_variant

  - id: VF-RETRIEVAL-DISTRACTOR-001
    purpose: relevant versus plausible-but-incorrect evidence selection
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: deterministic_overlay

  - id: VF-PROMPT-INJECTION-001
    purpose: indirect prompt injection and hostile OpenAPI metadata
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: adversarial_overlay

  - id: VF-PARSER-ABUSE-001
    purpose: malformed and resource-abuse parser inputs
    parents: []
    generation: dedicated_adversarial_artifact

  - id: VF-EXECUTION-POLICY-001
    purpose: target policy approval and redaction controls
    parents: [OAS-BASE-001]
    generation: deterministic_policy_fixture

  - id: VF-FAILURE-ANALYSIS-001
    purpose: observed-result versus hypothesis evaluation
    parents: []
    generation: synthetic_execution_evidence
case_contract:
  case_id_pattern: "^[A-Z]{2,6}-[0-9]{3}$"
  required_fields:
    - id
    - version
    - split
    - category
    - artifact_ids
    - artifact_hashes
    - variant_ids
    - user_request_or_trigger
    - ground_truth_ids
    - expected_boundary
    - expected_side_effects
    - scorer_ids
  case_is_not_a_unique_document: true
  expected_side_effect_fields:
    - model_calls
    - dns_requests
    - http_requests
    - execution_plans
    - approvals
benchmark_contract:
  total_cases: 100
  splits:
    development: 60
    validation: 20
    holdout: 20
  categories:
    - id: requirement_quality
      total: 20
      development: 12
      validation: 4
      holdout: 4

    - id: test_generation
      total: 20
      development: 12
      validation: 4
      holdout: 4

    - id: requirement_openapi_consistency
      total: 15
      development: 9
      validation: 3
      holdout: 3

    - id: retrieval_citation
      total: 15
      development: 9
      validation: 3
      holdout: 3

    - id: tool_planning_execution
      total: 10
      development: 6
      validation: 2
      holdout: 2

    - id: prompt_injection_security
      total: 10
      development: 6
      validation: 2
      holdout: 2

    - id: failure_analysis
      total: 5
      development: 3
      validation: 1
      holdout: 1

    - id: malformed_input_resilience
      total: 5
      development: 3
      validation: 1
      holdout: 1
parser_fixtures:
  expected_rejection_side_effects:
    model_calls: 0
    dns_requests: 0
    http_requests: 0
    execution_plans: 0
    approvals: 0

  markdown_text:
    - SEC-PARSE-MD-001     # raw-size limit
    - SEC-PARSE-MD-002     # line-count or line-length limit
    - SEC-PARSE-MD-003     # invalid encoding or malformed text

  json:
    - SEC-PARSE-JSON-001   # malformed JSON
    - SEC-PARSE-JSON-002   # duplicate key
    - SEC-PARSE-JSON-003   # maximum depth
    - SEC-PARSE-JSON-004   # node, collection, or scalar limit
    - SEC-PARSE-JSON-005   # time or memory limit

  yaml:
    - SEC-PARSE-YAML-001   # anchor or alias
    - SEC-PARSE-YAML-002   # custom tag
    - SEC-PARSE-YAML-003   # merge key
    - SEC-PARSE-YAML-004   # directive
    - SEC-PARSE-YAML-005   # duplicate key
    - SEC-PARSE-YAML-006   # multi-document stream
    - SEC-PARSE-YAML-007   # maximum depth
    - SEC-PARSE-YAML-008   # node, collection, or scalar limit
    - SEC-PARSE-YAML-009   # malformed YAML
    - SEC-PARSE-YAML-010   # time or memory limit

  openapi:
    - SEC-PARSE-OAS-001    # external network reference
    - SEC-PARSE-OAS-002    # relative or file/data reference
    - SEC-PARSE-OAS-003    # encoded reference
    - SEC-PARSE-OAS-004    # reference cycle or depth limit
    - SEC-PARSE-OAS-005    # reference-count limit
    - SEC-PARSE-OAS-006    # operation or component limit
    - SEC-PARSE-OAS-007    # server/externalDocs/callback/externalValue metadata

  pdf:
    - SEC-PARSE-PDF-001    # encrypted file
    - SEC-PARSE-PDF-002    # active content
    - SEC-PARSE-PDF-003    # attachment
    - SEC-PARSE-PDF-004    # malformed structure
    - SEC-PARSE-PDF-005    # page or object limit
    - SEC-PARSE-PDF-006    # decoded-stream limit
    - SEC-PARSE-PDF-007    # total-decoded-stream limit
    - SEC-PARSE-PDF-008    # decompression-ratio limit
    - SEC-PARSE-PDF-009    # parser timeout or memory limit
security_fixtures:
  prompt_injection:
    - SEC-PI-001            # ignore-instructions text
    - SEC-PI-002            # prompt or secret-exfiltration request
    - SEC-PI-003            # OpenAPI metadata URL as target instruction
    - SEC-PI-004            # tool-output or retrieved-evidence injection

  network_and_ssrf:
    - SEC-NET-001           # private or loopback destination
    - SEC-NET-002           # alternate IPv4 notation
    - SEC-NET-003           # IPv6 or link-local destination
    - SEC-NET-004           # redirect escape
    - SEC-NET-005           # DNS rebinding

  approval_and_execution:
    - SEC-APP-001           # missing approval
    - SEC-APP-002           # expired approval
    - SEC-APP-003           # mutated immutable plan
    - SEC-APP-004           # replayed approval
    - EXEC-POL-001          # unapproved target identifier
    - EXEC-POL-002          # prohibited method, count, size, or timeout

  isolation_and_redaction:
    - SEC-AUTH-001          # cross-project retrieval or access
    - SEC-AUTH-002          # guest write attempt
    - SEC-RED-001           # secret in stored or displayed evidence
    - SEC-ISO-001           # parser-worker private-endpoint allowlist or prohibited-access attempt
    - SEC-REJECT-001        # rejected input reaches downstream workflow

  expected_behavior:
    policy_violations: block
    rejected_parser_inputs: reject
    untrusted_content: no_authority
    forbidden_network_activity: zero_dns_and_http
    secrets: redact
release_integrity:
  every_case_must_reference_existing_ground_truth: true
  every_base_artifact_hash_must_match: true
  every_variant_must_declare_parent_and_hash: true
  every_security_fixture_must_declare_expected_boundary: true
  every_rejection_fixture_must_assert_zero_downstream_side_effects: true
  holdout_cases_must_not_be_used_for_tuning: true
  critical_security_cases_must_not_be_skipped_or_expected_failure: true
