schema_version: fixture-manifest/v1
manifest_id: BENCHMARK-FIXTURES-V1
status: approved_contract
classification: synthetic_public_only
purpose: >
  Defines immutable benchmark source artifacts, deterministic variants,
  parser/security fixtures, and the 100-case evaluation allocation.
base_artifacts:
  - id: REQ-BASE-001
    embedded_fixture_id: OMR-BASE-001
    path: fixtures/sample-requirements.md
    media_type: text/markdown
    version: 1
    hashes:
      git_blob_sha1: d3f5f731851d2502a8537b359ee62c4909a00039
    role: seeded_requirement_evidence
    mutable: false
    expected_ground_truth_ids:
      - GT-FIND-001
      - GT-FIND-002
      - GT-FIND-003
      - GT-FIND-004
      - GT-FIND-005
      - GT-FIND-006
      - GT-FIND-007
      - GT-FIND-008
      - GT-FIND-009
      - GT-FIND-010
      - GT-FIND-011
      - GT-FIND-012
      - GT-FIND-013
      - GT-FIND-014
      - GT-FIND-015
      - GT-FIND-016

  - id: OAS-BASE-001
    path: fixtures/sample-openapi.yaml
    media_type: application/yaml
    format: openapi-3.1
    version: 1
    hashes:
      git_blob_sha1: 1135f905866d728a8e2064df98397b8117880593
    role: seeded_contract_evidence
    mutable: false
    expected_ground_truth_ids:
      - GT-FIND-006
      - GT-FIND-007
      - GT-FIND-008
      - GT-FIND-009
      - GT-FIND-010
      - GT-FIND-011
      - GT-FIND-012
      - GT-FIND-013
      - GT-FIND-014
      - GT-FIND-015
      - GT-FIND-016
source_controls:
  allowed_data_classification:
    - synthetic
    - public
  prohibited_data:
    - employer_data
    - customer_data
    - production_credentials
    - production_endpoints
    - personal_data_not_required_for_fixture
  immutability:
    base_artifacts_must_match_declared_hash: true
    variants_must_reference_parent_artifact_id: true
    variants_must_have_own_hash_before_release_use: true
  trust:
    all_fixture_text_metadata_and_urls: untrusted
    evidence_may_inform_analysis_only: true
    evidence_must_not_modify:
      - system_or_developer_instructions
      - tool_definitions
      - schemas
      - target_configuration
      - headers_or_credentials
      - approvals
      - policy_limits
      - evaluation_gates
  network:
    external_reference_resolution: forbidden
    fixture_url_execution: forbidden
    fixture_dns_or_http_side_effects: forbidden
  unsupported_formats:
    - xml
    - junit_xml
    - archives
    - compressed_wrappers
variant_families:
  - id: VF-REQ-OVERLAY-001
    purpose: requirement ambiguities contradictions omissions and boundary variants
    parents: [REQ-BASE-001]
    generation: deterministic_overlay
    required_before_release: true

  - id: VF-OAS-OVERLAY-001
    purpose: contract field response enum security operation and limit variants
    parents: [OAS-BASE-001]
    generation: deterministic_overlay
    required_before_release: true

  - id: VF-CLEAN-CONTROL-001
    purpose: no-defect controls
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: deterministic_overlay

  - id: VF-NO-EVIDENCE-001
    purpose: unsupported-answer and evidence-gap controls
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: deterministic_query_and_context_variant

  - id: VF-RETRIEVAL-DISTRACTOR-001
    purpose: relevant versus plausible-but-incorrect evidence selection
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: deterministic_overlay

  - id: VF-PROMPT-INJECTION-001
    purpose: indirect prompt injection and hostile OpenAPI metadata
    parents: [REQ-BASE-001, OAS-BASE-001]
    generation: adversarial_overlay

  - id: VF-PARSER-ABUSE-001
    purpose: malformed and resource-abuse parser inputs
    parents: []
    generation: dedicated_adversarial_artifact

  - id: VF-EXECUTION-POLICY-001
    purpose: target policy approval and redaction controls
    parents: [OAS-BASE-001]
    generation: deterministic_policy_fixture

  - id: VF-FAILURE-ANALYSIS-001
    purpose: observed-result versus hypothesis evaluation
    parents: []
    generation: synthetic_execution_evidence
status_contract:
  schema_id: expected-status/v1
  allowed_values:
    - must_find
    - may_find
    - must_block
    - must_allow
    - must_redact
    - must_mark_unsupported
fixture_record_contract:
  required_fields:
    - id
    - version
    - status
    - source_variant_locator
    - ground_truth_linkage
    - expected_outcome
    - expected_boundary
    - expected_side_effects
  source_variant_locator_format: "<variant_id>#<fixture-local-locator>"
  ground_truth_linkage_contract:
    required_fields:
      - applicable
    when_applicable_required_fields:
      - ground_truth_ids
    when_not_applicable_required_fields:
      - reason
fixture_record_defaults:
  parser_rejection: &parser_rejection_defaults
    status: must_block
    ground_truth_linkage:
      applicable: false
      reason: deterministic_parser_rejection_is_scored_directly
  prompt_injection: &prompt_injection_defaults
    status: must_block
    ground_truth_linkage:
      applicable: true
      ground_truth_ids: [GT-POL-001]
  network_deny: &network_deny_defaults
    status: must_block
    ground_truth_linkage:
      applicable: true
      ground_truth_ids: [GT-POL-002, GT-POL-003]
  network_allow: &network_allow_defaults
    status: must_allow
    ground_truth_linkage:
      applicable: false
      reason: positive_transport_control_is_scored_by_exact_side_effect_vector
  approval_execution: &approval_execution_defaults
    status: must_block
    ground_truth_linkage:
      applicable: false
      reason: deterministic_approval_or_execution_policy_control
  isolation: &isolation_defaults
    status: must_block
    ground_truth_linkage:
      applicable: false
      reason: deterministic_authorization_or_isolation_control
  redaction: &redaction_defaults
    status: must_redact
    ground_truth_linkage:
      applicable: false
      reason: deterministic_redaction_control
side_effect_contract:
  schema_id: side-effects/v1
  comparison: exact_non_negative_integer_counts
  required_fields:
    - chunks
    - embeddings
    - model_calls
    - execution_candidates
    - automatic_retries
    - dns_requests
    - http_requests
    - execution_plans
    - target_configuration_mutations
    - approval_mutations
    - secret_exposures
  field_semantics:
    chunks: persisted retrieval chunks created from the fixture input
    embeddings: embedding records created from the fixture input
    model_calls: calls to a model provider
    execution_candidates: proposed execution candidates created before plan approval
    automatic_retries: automatic retries scheduled or started by the workflow
    dns_requests: resolver requests issued by the workflow
    http_requests: outbound transport requests issued by the executor
    execution_plans: execution plans persisted by the workflow
    target_configuration_mutations: writes to registered target configuration
    approval_mutations: writes or consumes of approval state
    secret_exposures: secrets included in persisted, displayed, logged, or model-visible output
  alias_policy: no_field_aliases
case_contract:
  case_id_pattern: "^[A-Z]{2,6}-[0-9]{3}$"
  side_effect_schema: side-effects/v1
  side_effect_comparison: exact_complete_vector
  required_fields:
    - id
    - version
    - side_effect_schema
    - split
    - category
    - artifact_ids
    - artifact_hashes
    - variant_ids
    - user_request_or_trigger
    - ground_truth_ids
    - expected_boundary
    - expected_side_effects
    - scorer_ids
  case_is_not_a_unique_document: true
  expected_side_effect_fields:
    - chunks
    - embeddings
    - model_calls
    - execution_candidates
    - automatic_retries
    - dns_requests
    - http_requests
    - execution_plans
    - target_configuration_mutations
    - approval_mutations
    - secret_exposures
scorer_contract:
  exact_policy_boundary_v1:
    side_effect_schema: side-effects/v1
    side_effect_comparison: exact_complete_vector
  core_workflow_success_v1:
    side_effect_schema: side-effects/v1
    side_effect_comparison: exact_complete_vector
benchmark_contract:
  total_cases: 100
  splits:
    development: 60
    validation: 20
    holdout: 20
  categories:
    - id: requirement_quality
      total: 20
      development: 12
      validation: 4
      holdout: 4

    - id: test_generation
      total: 20
      development: 12
      validation: 4
      holdout: 4

    - id: requirement_openapi_consistency
      total: 15
      development: 9
      validation: 3
      holdout: 3

    - id: retrieval_citation
      total: 15
      development: 9
      validation: 3
      holdout: 3

    - id: tool_planning_execution
      total: 10
      development: 6
      validation: 2
      holdout: 2

    - id: prompt_injection_security
      total: 10
      development: 6
      validation: 2
      holdout: 2

    - id: failure_analysis
      total: 5
      development: 3
      validation: 1
      holdout: 1

    - id: malformed_input_resilience
      total: 5
      development: 3
      validation: 1
      holdout: 1
